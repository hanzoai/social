---
name: docker-publish

# Build and push ghcr.io/hanzoai/social. amd64 only — arm64 ARC pool is paused
# on DOKS until DigitalOcean ships arm64 droplets (see hanzoai/.github RUNNERS.md).
#
# Semver-only publish policy: v* tags produce a published image; branch pushes
# only produce sha-<sha7>. No floating tags.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  docker:
    strategy:
      matrix:
        include:
          - image: ghcr.io/hanzoai/social-backend
            target: backend
          - image: ghcr.io/hanzoai/social-frontend
            target: frontend
          - image: ghcr.io/hanzoai/social-orchestrator
            target: orchestrator
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image }}
      dockerfile: Dockerfile
      target: ${{ matrix.target }}
      platforms: linux/amd64
      runner-amd64: '["self-hosted","linux","amd64"]'
      build-args: |
        NEXT_PUBLIC_VERSION=${{ github.sha }}
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
