---
name: docker-publish

# Self-contained build for ghcr.io/hanzoai/social-{backend,frontend,orchestrator}.
#
# hanzoai/social is PUBLIC (AGPL-3.0 fork — source must stay offered to
# social.hanzo.ai users), and GitHub forbids public repos from calling the
# private hanzoai/.github reusable workflow. This file therefore inlines the
# canonical docker-build pattern (same runner labels, same tag policy):
#   v* git tag  → :X.Y.Z (+ :latest)
#   branch push → :sha-<sha7> (immutable, no floating)
#   PR push     → :pr-N (ephemeral review)
# amd64 only — arm64 ARC pool is paused until DO ships arm64 droplets.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: [self-hosted, linux, amd64]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/hanzoai/social-backend
            target: backend
          - image: ghcr.io/hanzoai/social-frontend
            target: frontend
          - image: ghcr.io/hanzoai/social-orchestrator
            target: orchestrator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
